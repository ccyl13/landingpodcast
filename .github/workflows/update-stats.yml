name: Update Social Stats

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 08:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Scrape and update stats
        run: python scripts/update_stats.py

      - name: Commit if changed
        run: |
          git config user.name  "stats-bot"
          git config user.email "actions@github.com"
          git add data/stats.json data/reels.json
          git diff --staged --quiet || (
            git commit -m "chore: update social stats $(date +'%Y-%m-%d')" &&
            git push
          )
